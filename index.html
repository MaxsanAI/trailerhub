<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrailerHub PRO</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:#fff;
}

/* APP */
.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#111;
  padding:12px;
  overflow-y:auto;
}

.sidebar h2{
  font-size:16px;
  margin:10px 0;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#222;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

#search{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.card{
  background:#161616;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  display:block;
}

.card h3{
  font-size:12px;
  padding:6px;
}

/* PLAYER */
.player{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  z-index:999;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

.close{
  position:absolute;
  top:10px;
  right:10px;
  background:#222;
  color:#fff;
  border:0;
  padding:10px;
  cursor:pointer;
  z-index:1000;
}

.video-wrap{
  width:100%;
  max-width:900px;
  aspect-ratio:16/9;
  margin:auto;
}

.content{
  max-width:900px;
  margin:auto;
  padding:10px;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🎬 TrailerHub</h2>
    <button onclick="filterCat('All')">All</button>
    <button onclick="filterCat('Action')">Action</button>
    <button onclick="filterCat('Sci-Fi')">Sci-Fi</button>
    <button onclick="filterCat('Horror')">Horror</button>
    <button onclick="filterCat('Drama')">Drama</button>
    <button onclick="filterCat('Superhero')">Superhero</button>
    <button onclick="filterCat('Trending')">🔥 Trending</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <input id="search" placeholder="Search trailers..." oninput="search()"/>

    <div class="grid" id="grid"></div>

  </div>

</div>

<!-- PLAYER -->
<div class="player" id="player">
  <button class="close" onclick="closeP()">✖</button>

  <div class="video-wrap">
    <iframe id="frame"></iframe>
  </div>

  <div class="content" id="desc"></div>
</div>

<script>

/* =========================

========================= */

const trailers = [

{ id:"8ugaeA-nMTc", title:"Black Panther", cat:"Superhero", score:95 },
{ id:"-FmWuCgJmxo", title:"Guardians of the Galaxy 3", cat:"Superhero", score:94 },
{ id:"QNo6g3z1h8E", title:"Eternals", cat:"Superhero", score:85 },
{ id:"Q0CbN8sfihY", title:"Black Adam", cat:"Superhero", score:84 },
{ id:"gqGzlLQ9V6k", title:"Aquaman", cat:"Superhero", score:88 },

{ id:"XxVg_s8xAms", title:"Fast X", cat:"Action", score:90 },
{ id:"YdgkT0x0pZk", title:"Fast & Furious 9", cat:"Action", score:89 }
];

/* ========================= */

let filtered = trailers;
let index = 0;

const grid = document.getElementById("grid");

function render(list){
  grid.innerHTML="";

  list.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="https://img.youtube.com/vi/${t.id}/hqdefault.jpg">
      <h3>${t.title}</h3>
    `;

    div.onclick=()=>open(i);

    grid.appendChild(div);
  });
}

function open(i){
  index=i;

  const t = filtered[i];

  document.getElementById("player").style.display="flex";
  document.getElementById("frame").src =
    "https://www.youtube.com/embed/"+t.id;

  document.getElementById("desc").innerHTML=`
    <h2>${t.title}</h2>
    <p>Category: ${t.cat}</p>
    <p>⭐ Score: ${t.score}</p>
  `;
}

function closeP(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}

/* FILTER */
function filterCat(cat){
  if(cat==="All") filtered = trailers;
  else if(cat==="Trending")
    filtered = [...trailers].sort((a,b)=>b.score-a.score);
  else filtered = trailers.filter(t=>t.cat===cat);

  render(filtered);
}

/* SEARCH */
function search(){
  const v=document.getElementById("search").value.toLowerCase();

  filtered = trailers.filter(t =>
    t.title.toLowerCase().includes(v)
  );

  render(filtered);
}

render(trailers);

</script>

</body>
</html>
