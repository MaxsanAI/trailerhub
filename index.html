<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrailerHub - Movie Trailers</title>

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
h1 {
  padding:16px;
  margin:0;
  font-size:22px;
}

/* GRID (Netflix feel) */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card {
  background:#161616;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
}

.card:hover {
  transform:scale(1.04);
}

.card img { width:100%; }

.card h3 {
  padding:8px;
  font-size:13px;
}

/* PLAYER */
.player {
  position:fixed;
  inset:0;
  background:#0b0b0b;
  display:none;
  flex-direction:column;
  z-index:999;
  overflow-y:auto;
}

/* TOP CONTROLS */
.controls {
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}

button {
  background:#222;
  border:1px solid #333;
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
}

/* YOUTUBE STYLE VIDEO */
.video-container {
  width:100%;
  display:flex;
  justify-content:center;
  padding:10px;
}

.video-wrap {
  width:100%;
  max-width:900px;
  aspect-ratio:16/9;
  background:#000;
  border-radius:12px;
  overflow:hidden;
}

iframe {
  width:100%;
  height:100%;
  border:0;
}

/* CONTENT */
.content {
  max-width:900px;
  margin:0 auto;
  padding:15px;
}

.desc {
  font-size:15px;
  line-height:1.6;
}

.comments {
  margin-top:15px;
}

input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

a { color:#4da3ff; text-decoration:none; }

</style>
</head>

<body>

<h1>🎬 TrailerHub</h1>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player" id="player">

  <div class="controls">
    <button onclick="prev()">⬅</button>
    <button onclick="like()">❤️ <span id="likes">0</span></button>
    <button onclick="next()">➡</button>
    <button onclick="closePlayer()">✖</button>
  </div>

  <!-- VIDEO -->
  <div class="video-container">
    <div class="video-wrap">
      <iframe id="video"></iframe>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="desc" id="desc"></div>

    <div class="comments">
      <div id="commentList"></div>
      <input id="commentInput" placeholder="Add comment..." />
      <button onclick="addComment()">Post</button>
    </div>

  </div>

</div>

<script>

const monetag = "https://omg10.com/4/9027972";

/* DATA */
const trailers = [
{id:"uYPbbksJxIg",title:"Oppenheimer"},
{id:"Way9Dexny3w",title:"Dune Part 2"},
{id:"mqqft2x_Aa4",title:"The Batman"},
{id:"xy8aJw1vYHo",title:"Joker 2"},
{id:"73_1biulkYk",title:"Deadpool 3"},
{id:"TcMBFSGVi1c",title:"Avengers Endgame"},
{id:"JfVOs4VSpmA",title:"Spider-Man No Way Home"},
{id:"qEVUtrk8_B4",title:"John Wick 4"},
{id:"avz06PDqDbM",title:"Mission Impossible"},
{id:"32RAq6JzY-w",title:"Fast X"}
];

let currentIndex = 0;

/* GRID */
const grid = document.getElementById("grid");

trailers.forEach((t,i)=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="https://img.youtube.com/vi/${t.id}/hqdefault.jpg">
    <h3>${t.title}</h3>
  `;

  div.onclick=()=>openPlayer(i);
  grid.appendChild(div);
});

/* PLAYER */
function openPlayer(i){
  currentIndex=i;
  document.getElementById("player").style.display="flex";
  load();
}

function load(){
  const t=trailers[currentIndex];

  document.getElementById("video").src =
    "https://www.youtube.com/embed/"+t.id;

  document.getElementById("desc").innerHTML=`
    <h2>${t.title}</h2>

    <p>
      ${t.title} is a cinematic trailer showcasing modern blockbuster filmmaking,
      visual effects and storytelling designed for global audiences.
    </p>

    <p>
      Discover more movie content and related trailers on
      <a href="${monetag}" target="_blank">this page</a>.
    </p>

    <p>
      Stay updated with trending movies, action hits and upcoming releases.
    </p>
  `;

  loadLikes();
  loadComments();
}

function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("video").src="";
}

/* NAV */
function next(){
  currentIndex=(currentIndex+1)%trailers.length;
  load();
}

function prev(){
  currentIndex=(currentIndex-1+trailers.length)%trailers.length;
  load();
}

/* LIKES */
function like(){
  const t=trailers[currentIndex];
  const key="l_"+t.id;
  let v=localStorage.getItem(key)||0;
  v++;
  localStorage.setItem(key,v);
  document.getElementById("likes").innerText=v;
}

function loadLikes(){
  const t=trailers[currentIndex];
  const key="l_"+t.id;
  document.getElementById("likes").innerText=localStorage.getItem(key)||0;
}

/* COMMENTS */
function addComment(){
  const t=trailers[currentIndex];
  const input=document.getElementById("commentInput");
  if(!input.value) return;

  const key="c_"+t.id;
  let arr=JSON.parse(localStorage.getItem(key)||"[]");

  arr.push(input.value);
  localStorage.setItem(key,JSON.stringify(arr));

  input.value="";
  loadComments();
}

function loadComments(){
  const t=trailers[currentIndex];
  const key="c_"+t.id;
  let arr=JSON.parse(localStorage.getItem(key)||"[]");

  document.getElementById("commentList").innerHTML=
    arr.map(c=>`<p>💬 ${c}</p>`).join("");
}

</script>

</body>
</html>
