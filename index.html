<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrailerHub</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">TrailerHub</div>

  <input id="search" placeholder="Search movies..." oninput="searchMovies(this.value)" />
</nav>

<!-- HERO -->
<header class="hero">
  <div class="hero-overlay">
    <h1 id="heroTitle">Loading...</h1>
    <p id="heroDesc"></p>
    <button onclick="openHero()">▶ Play</button>
  </div>
</header>

<!-- CATEGORIES -->
<section class="container">

  <h2>🔥 Trending</h2>
  <div id="trending" class="row"></div>

  <h2>🆕 Latest</h2>
  <div id="latest" class="row"></div>

  <h2>⭐ Top Rated</h2>
  <div id="top" class="row"></div>

</section>

<!-- PLAYER -->
<div id="player" class="player hidden">
  <div class="player-box">
    <span onclick="closePlayer()" class="close">✖</span>
    <div id="video"></div>
    <div id="info"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
