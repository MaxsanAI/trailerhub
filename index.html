<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StreamTrailers</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h2>Browse</h2>
    <button onclick="filterGenre('popular')">🔥 Trending</button>
    <button onclick="filterGenre('28')">Action</button>
    <button onclick="filterGenre('878')">Sci-Fi</button>
    <button onclick="filterGenre('27')">Horror</button>
    <button onclick="filterGenre('18')">Drama</button>
  </aside>

  <main>

    <header>
      <input id="search" placeholder="Search movies..." oninput="searchMovies(this.value)" />
    </header>

    <section id="grid" class="grid"></section>

  </main>

</div>

<!-- PLAYER -->
<div id="player" class="player hidden">
  <div class="player-content">
    <span onclick="closePlayer()" class="close">✖</span>

    <div id="video"></div>
    <div id="info"></div>

    <div class="engagement">
      <button onclick="likeMovie()">❤️ Like</button>
      <span id="likes"></span>
    </div>

    <div class="comments">
      <input id="commentInput" placeholder="Write comment..." />
      <button onclick="addComment()">Post</button>
      <div id="commentList"></div>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
