<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Short Movie Trailers (Under 60s) | TrailerHub</title>
<meta name="description" content="Watch short movie trailers under 60 seconds. Swipe, like and comment. Discover trending previews updated daily.">

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:#fff; }
h1 { padding:15px; margin:0; }

.toptext { padding:10px; line-height:1.5; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s;
}
.card:hover { transform:scale(1.03); }

.card img { width:100%; }
.card h3 { padding:8px; font-size:14px; }

/* PLAYER */
.player {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000;
  display:none;
  flex-direction:column;
  z-index:999;
}

.player iframe {
  width:100%;
  height:260px;
}

.controls {
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#111;
}

button {
  background:#222;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.desc { padding:10px; line-height:1.5; }

.comments { padding:10px; }
input {
  width:100%;
  padding:8px;
  margin-top:5px;
}

a { color:#00bfff; text-decoration:none; }
a:hover { text-decoration:underline; }
</style>
</head>

<body>

<h1>🔥 TrailerHub</h1>

<div class="toptext">
  Discover <strong>short movie trailers under 60 seconds</strong>.  
  Swipe through trending previews and find the best scenes instantly.  
  👉 <a href="#" onclick="smartRedirect()">Watch full trailers in HD</a>
</div>

<div class="grid" id="grid"></div>

<div class="player" id="player">
  <div class="controls">
    <button onclick="prev()">⬅</button>
    <button onclick="like()">❤️ <span id="likes">0</span></button>
    <button onclick="next()">➡</button>
    <button onclick="closePlayer()">✖</button>
  </div>

  <iframe id="video" src="" frameborder="0" allowfullscreen></iframe>

  <div class="desc" id="desc"></div>

  <div class="comments">
    <div id="commentList"></div>
    <input id="commentInput" placeholder="Add comment..." />
    <button onclick="addComment()">Post</button>
  </div>
</div>

<script>

// 🔗 MONETAG LINK
const monetag = "https://omg10.com/4/9027972";

// 🧠 SMART CTR LOGIC
let interactions = 0;

function smartRedirect(){
  interactions++;

  // trigger tek posle 3+ interakcije
  if(interactions >= 3 && interactions % 2 === 1){
    window.open(monetag, "_blank");
  }
}

// 🎬 TRAILERS
const trailers = [
{id:"uYPbbksJxIg",title:"Oppenheimer Trailer"},
{id:"Way9Dexny3w",title:"Dune Part 2 Trailer"},
{id:"mqqft2x_Aa4",title:"The Batman"},
{id:"xy8aJw1vYHo",title:"Joker 2"},
{id:"73_1biulkYk",title:"Deadpool 3"},
{id:"TcMBFSGVi1c",title:"Avengers Endgame"},
{id:"JfVOs4VSpmA",title:"Spider-Man No Way Home"},
{id:"qEVUtrk8_B4",title:"John Wick 4"},
{id:"avz06PDqDbM",title:"Mission Impossible"},
{id:"32RAq6JzY-w",title:"Fast X"},
{id:"QF-oyCwaArU",title:"The Nun 2"},
{id:"ZuQuOnYnr3Q",title:"Insidious Red Door"},
{id:"pBk4NYhWNMM",title:"Barbie"},
{id:"OAZWXUkrjPc",title:"Napoleon"},
{id:"itnqEauWQZM",title:"Transformers"},
{id:"FV3bqvOHRQo",title:"Aquaman 2"},
{id:"xjDjIWPwcPU",title:"Black Panther"},
{id:"Go8nTmfrQd8",title:"Thor Love & Thunder"},
{id:"aWzlQ2N6qqg",title:"Doctor Strange"},
{id:"YH4jFZfG2Go",title:"Gladiator 2"}
];

let currentIndex = 0;

// GRID
const grid = document.getElementById("grid");

trailers.forEach((t,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`
    <img src="https://img.youtube.com/vi/${t.id}/hqdefault.jpg">
    <h3>${t.title}</h3>
  `;
  div.onclick=()=>openPlayer(i);
  grid.appendChild(div);
});

// PLAYER
function openPlayer(i){
  currentIndex=i;
  document.getElementById("player").style.display="flex";
  loadTrailer();
}

function loadTrailer(){
  const t = trailers[currentIndex];
  document.getElementById("video").src="https://www.youtube.com/embed/"+t.id;

  document.getElementById("desc").innerHTML = `
    <h2>${t.title}</h2>

    <p>
      Watch the official ${t.title}. Discover highlights, action scenes and story preview.
    </p>

    <p>
      👉 <a href="${monetag}" target="_blank">Watch full trailer in HD</a>
    </p>

    <p>
      Want more exclusive content?  
      👉 <a href="${monetag}" target="_blank">Unlock premium trailers</a>
    </p>
  `;

  loadLikes();
  loadComments();
}

function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("video").src="";
}

// ▶ NAVIGATION
function next(){
  currentIndex = (currentIndex+1)%trailers.length;
  loadTrailer();
  smartRedirect();
}

function prev(){
  currentIndex = (currentIndex-1+trailers.length)%trailers.length;
  loadTrailer();
}

// ❤️ LIKES
function like(){
  const key="likes_"+trailers[currentIndex].id;
  let val = localStorage.getItem(key) || 0;
  val++;
  localStorage.setItem(key,val);
  document.getElementById("likes").innerText=val;
}

function loadLikes(){
  const key="likes_"+trailers[currentIndex].id;
  document.getElementById("likes").innerText=localStorage.getItem(key)||0;
}

// 💬 COMMENTS
function addComment(){
  const input=document.getElementById("commentInput");
  const text=input.value;
  if(!text) return;

  const key="comments_"+trailers[currentIndex].id;
  let arr=JSON.parse(localStorage.getItem(key)||"[]");

  arr.push(text);
  localStorage.setItem(key,JSON.stringify(arr));

  input.value="";
  loadComments();
}

function loadComments(){
  const key="comments_"+trailers[currentIndex].id;
  const list=document.getElementById("commentList");

  let arr=JSON.parse(localStorage.getItem(key)||"[]");

  list.innerHTML=arr.map(c=>`<p>💬 ${c}</p>`).join("");
}

</script>

</body>
</html>
