<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrailerHub Pro</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="nav">
  <div class="logo">🎬 TrailerHub</div>
  <input id="search" placeholder="Search movies..." oninput="searchMovies(this.value)" />
</nav>

<header class="hero" id="hero">
  <div class="hero-overlay">
    <h1 id="heroTitle">Loading...</h1>
    <p id="heroDesc"></p>
    <button onclick="playHero()">▶ Play</button>
  </div>
</header>

<section class="container">

  <div class="row">
    <h2>🔥 Trending</h2>
    <div id="trending" class="row-scroll"></div>
  </div>

  <div class="row">
    <h2>🎬 Popular Movies</h2>
    <div id="popular" class="row-scroll"></div>
  </div>

  <div class="row">
    <h2>⭐ Top Rated</h2>
    <div id="toprated" class="row-scroll"></div>
  </div>

  <div class="row">
    <h2>🚀 Upcoming</h2>
    <div id="upcoming" class="row-scroll"></div>
  </div>

  <div class="row">
    <h2>📺 Series</h2>
    <div id="series" class="row-scroll"></div>
  </div>

</section>

<div id="player" class="player hidden">
  <div class="player-box">
    <span class="close" onclick="closePlayer()">✖</span>
    <div id="video"></div>
    <div id="info"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
