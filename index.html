<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrailerHub - Trending Movie Trailers</title>
<meta name="description" content="Watch trending, new and action movie trailers. SEO insights, ratings and short cinematic previews.">

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
  color:#fff;
}

h1 {
  padding:18px;
  margin:0;
  font-size:22px;
}

.nav {
  display:flex;
  gap:8px;
  padding:10px 15px;
}

.nav button {
  background:#222;
  border:1px solid #333;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card {
  background:#161616;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  transition:0.2s;
}

.card:hover {
  transform:scale(1.04);
}

.card img { width:100%; }

.card h3 {
  padding:8px;
  font-size:13px;
}

/* PLAYER */
.player {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.96);
  display:none;
  flex-direction:column;
  z-index:999;
  overflow:hidden;
}

/* VIDEO FIX */
.video-wrap {
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  flex-shrink:0;
}

iframe {
  width:100%;
  height:100%;
  border:0;
}

/* CONTENT SCROLL */
.content {
  flex:1;
  overflow-y:auto;
  padding-bottom:20px;
}

.controls {
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#111;
}

button {
  background:#222;
  border:1px solid #333;
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
}

.desc {
  padding:12px;
  line-height:1.5;
  font-size:14px;
}

.comments {
  padding:12px;
}

input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

a { color:#4da3ff; text-decoration:none; }
</style>
</head>

<body>

<h1>🎬 TrailerHub</h1>

<div class="nav">
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('trending')">🔥 Trending</button>
  <button onclick="setFilter('new')">🆕 New</button>
  <button onclick="setFilter('action')">💥 Action</button>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player" id="player">

  <div class="controls">
    <button onclick="prev()">⬅</button>
    <button onclick="like()">❤️ <span id="likes">0</span></button>
    <button onclick="next()">➡</button>
    <button onclick="closePlayer()">✖</button>
  </div>

  <div class="video-wrap">
    <iframe id="video"></iframe>
  </div>

  <div class="content">

    <div class="desc" id="desc"></div>

    <div class="comments">
      <div id="commentList"></div>
      <input id="commentInput" placeholder="Add comment..." />
      <button onclick="addComment()">Post</button>
    </div>

  </div>

</div>

<script>

const monetag = "https://omg10.com/4/9027972";

let filter = "all";
let currentIndex = 0;

/* SCORE */
function getScore(t){
  let base = t.title.length * 2;
  if(t.type==="trending") base += 40;
  if(t.type==="action") base += 25;
  if(t.type==="new") base += 15;
  return Math.min(99, base);
}

/* KEYWORDS */
function getKeywords(t){
  return `${t.title}, ${t.type}, movie trailer, cinema, hollywood, 2026`;
}

/* DATA */
const trailers = [
{id:"uYPbbksJxIg",title:"Oppenheimer",type:"trending"},
{id:"Way9Dexny3w",title:"Dune Part 2",type:"trending"},
{id:"mqqft2x_Aa4",title:"The Batman",type:"action"},
{id:"xy8aJw1vYHo",title:"Joker 2",type:"new"},
{id:"73_1biulkYk",title:"Deadpool 3",type:"action"},
{id:"TcMBFSGVi1c",title:"Avengers Endgame",type:"trending"},
{id:"JfVOs4VSpmA",title:"Spider-Man",type:"action"},
{id:"qEVUtrk8_B4",title:"John Wick 4",type:"action"},
{id:"avz06PDqDbM",title:"Mission Impossible",type:"action"},
{id:"32RAq6JzY-w",title:"Fast X",type:"trending"}
];

/* FILTER */
function setFilter(f){
  filter=f;
  render();
}

function getList(){
  if(filter==="all") return trailers;
  return trailers.filter(t=>t.type===filter);
}

/* GRID */
const grid=document.getElementById("grid");

function render(){
  grid.innerHTML="";
  getList().forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="https://img.youtube.com/vi/${t.id}/hqdefault.jpg">
      <h3>${t.title}</h3>
    `;

    div.onclick=()=>openPlayer(i);
    grid.appendChild(div);
  });
}
render();

/* PLAYER */
function openPlayer(i){
  currentIndex=i;
  document.getElementById("player").style.display="flex";
  load();
}

function load(){
  const t=getList()[currentIndex];

  document.getElementById("video").src =
    "https://www.youtube.com/embed/"+t.id;

  const score=getScore(t);

  document.getElementById("desc").innerHTML=`
    <h2>${t.title}</h2>

    <p><strong>Trending score:</strong> ${score}/100</p>

    <p><strong>Keywords:</strong> ${getKeywords(t)}</p>

    <p>
      ${t.title} is a modern cinematic trailer showcasing visual storytelling,
      action sequences and high production value typical for blockbuster films.
    </p>

    <p>
      Explore more trending movie content and related previews on
      <a href="${monetag}" target="_blank">this page</a>.
    </p>

    <p>
      Discover daily updated trailers across action, sci-fi and drama categories.
    </p>
  `;

  loadLikes();
  loadComments();
}

function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("video").src="";
}

/* NAV */
function next(){
  const list=getList();
  currentIndex=(currentIndex+1)%list.length;
  load();
}

function prev(){
  const list=getList();
  currentIndex=(currentIndex-1+list.length)%list.length;
  load();
}

/* LIKES */
function like(){
  const t=getList()[currentIndex];
  const key="l_"+t.id;
  let v=localStorage.getItem(key)||0;
  v++;
  localStorage.setItem(key,v);
  document.getElementById("likes").innerText=v;
}

function loadLikes(){
  const t=getList()[currentIndex];
  const key="l_"+t.id;
  document.getElementById("likes").innerText=localStorage.getItem(key)||0;
}

/* COMMENTS */
function addComment(){
  const t=getList()[currentIndex];
  const input=document.getElementById("commentInput");
  if(!input.value) return;

  const key="c_"+t.id;
  let arr=JSON.parse(localStorage.getItem(key)||"[]");

  arr.push(input.value);
  localStorage.setItem(key,JSON.stringify(arr));

  input.value="";
  loadComments();
}

function loadComments(){
  const t=getList()[currentIndex];
  const key="c_"+t.id;
  let arr=JSON.parse(localStorage.getItem(key)||"[]");

  document.getElementById("commentList").innerHTML=
    arr.map(c=>`<p>💬 ${c}</p>`).join("");
}

</script>

</body>
</html>
