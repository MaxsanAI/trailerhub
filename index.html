<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StreamFlix</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-overlay">
    <h1 id="heroTitle">Loading...</h1>
    <p id="heroDesc"></p>
    <button onclick="openHero()">▶ Play Trailer</button>
  </div>
</header>

<!-- NAV -->
<nav class="nav">
  <div class="logo">StreamFlix</div>
  <input id="search" placeholder="Search movies..." oninput="searchMovies(this.value)" />
</nav>

<!-- GRID -->
<section class="container">
  <h2>Trending Now</h2>
  <div id="grid" class="grid"></div>
</section>

<!-- PLAYER -->
<div id="player" class="player hidden">
  <div class="player-box">
    <span onclick="closePlayer()" class="close">✖</span>
    <div id="video"></div>
    <div id="info"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
