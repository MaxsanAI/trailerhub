<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFlix</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="logo">StreamFlix</div>
  <input id="search" placeholder="Search..." oninput="searchMovies(this.value)">
</nav>

<header class="hero">
  <div class="hero-overlay">
    <h1 id="heroTitle">Loading...</h1>
    <p id="heroDesc"></p>
    <button onclick="openHero()">▶ Play</button>
  </div>
</header>

<section class="container">
  <h2>Trending</h2>
  <div id="grid" class="grid"></div>
</section>

<div id="player" class="player hidden">
  <div class="player-box">
    <span onclick="closePlayer()" class="close">✖</span>
    <div id="video"></div>
    <div id="info"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
